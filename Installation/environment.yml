name: BAOEnv
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  - numpy=1.26.4
  - scipy
  - cython
  - gsl
  - c-compiler
  - cxx-compiler
  - fftw
  - mpi4py
  - openmpi
  - matplotlib
  - pandas
  - pip
  - pip:
      - classy
      - cobaya
      - camb
      - jax
      - jaxlib
      - iminuit
      - "lsstypes @ git+https://github.com/adematti/lsstypes"
      - "pycorr @ git+https://github.com/cosmodesi/pycorr"
      - "cosmoprimo[astropy] @ git+https://github.com/cosmodesi/cosmoprimo"
      - "pypower @ git+https://github.com/cosmodesi/pypower"
      - "desilike[plotting,jax] @ git+https://github.com/cosmodesi/desilike@152d3a545d793deffd59bcce543dc9f2f9ab9869"
      - "pyclass @ git+https://github.com/adematti/pyclass"
      - anesthetic
      - zeus-mcmc
